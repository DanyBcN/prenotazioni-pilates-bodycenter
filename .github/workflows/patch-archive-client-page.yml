name: Patch archive client page

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch app.py
        run: |
          python - <<'PY'
          from pathlib import Path
          import py_compile

          p = Path('app.py')
          s = p.read_text(encoding='utf-8')

          if 'def render_archive_open_client(data, sha):' not in s:
              marker = '\n\ndef render_archive_mobile(df, data, sha):\n'
              insert = '''\n\ndef render_archive_open_client(data, sha):\n    open_cid = st.session_state.get("archive_open_client_id")\n    if not open_cid:\n        return False\n    if st.button("← Torna all’Archivio", key="archive_back_to_list", use_container_width=is_mobile_client()):\n        st.session_state.pop("archive_open_client_id", None)\n        st.rerun()\n    render_client_form(data, sha, open_cid, prefix="archivio_page", close_key="archive_open_client_id")\n    return True\n'''
              if marker not in s:
                  raise SystemExit('Marker render_archive_mobile not found')
              s = s.replace(marker, insert + marker, 1)

          old = '''def render_archive(data, sha):\n    st.subheader("Archivio, pagamenti e statistiche")'''
          new = '''def render_archive(data, sha):\n    if render_archive_open_client(data, sha):\n        return\n    st.subheader("Archivio, pagamenti e statistiche")'''
          if old in s:
              s = s.replace(old, new, 1)

          old = '''    choice = st.selectbox("Apri scheda cliente", opts)\n    if choice != "—":\n        cid = choice.split("|")[-1].strip()\n        st.divider()\n        render_client_form(data, sha, cid, prefix="archivio_pc")'''
          new = '''    choice = st.selectbox("Apri scheda cliente", opts, key="archive_open_select")\n    if choice != "—":\n        st.session_state["archive_open_client_id"] = choice.split("|")[-1].strip()\n        st.rerun()'''
          if old in s:
              s = s.replace(old, new, 1)

          old = '''    st.session_state.pop("archive_open_client_id", None)\n    st.session_state["_last_section"] = section'''
          new = '''    st.session_state.pop("archive_open_client_id", None)\n    st.session_state.pop("archive_open_select", None)\n    st.session_state["_last_section"] = section'''
          if old in s:
              s = s.replace(old, new, 1)

          workflow = Path('.github/workflows/patch-archive-client-page.yml')
          if workflow.exists():
              workflow.unlink()

          p.write_text(s, encoding='utf-8')
          py_compile.compile('app.py', doraise=True)
          PY
      - name: Commit patch
        run: |
          if git diff --quiet; then
            echo "No changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app.py .github/workflows/patch-archive-client-page.yml
          git commit -m "Open archive client as page"
          git push
